services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./database.json:/app/database.json
      - ./import:/app/import
      - ./public/assets:/app/public/assets

  ingest-watch:
    build: .
    command: ["npm", "run", "ingest:watch"]
    volumes:
      - ./database.json:/app/database.json
      - ./import:/app/import
      - ./public/assets:/app/public/assets
